name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            echo "==> Masuk ke direktori project..."
            cd /var/www/sim-ph

            echo "==> Pull perubahan terbaru dari GitHub..."
            git pull origin master

            echo "==> Install/update dependensi PHP..."
            composer install --no-dev --optimize-autoloader --no-interaction

            echo "==> Jalankan migrasi database..."
            php artisan migrate --force

            echo "==> Bersihkan & cache konfigurasi..."
            php artisan config:clear
            php artisan config:cache
            php artisan route:clear
            php artisan route:cache
            php artisan view:clear
            php artisan view:cache

            echo "==> Symlink storage..."
            php artisan storage:link || true

            echo "==> Set permission folder..."
            chown -R www-data:www-data /var/www/sim-ph/storage
            chown -R www-data:www-data /var/www/sim-ph/bootstrap/cache
            chmod -R 775 /var/www/sim-ph/storage
            chmod -R 775 /var/www/sim-ph/bootstrap/cache

            echo "==> Restart queue worker (jika ada)..."
            php artisan queue:restart || true

            echo "==> Reload Nginx..."
            systemctl reload nginx

            echo "✅ Deploy selesai!"
